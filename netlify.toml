[build]
  command = "pnpm run build"
  publish = "dist"
  install_command = "pnpm install --no-frozen-lockfile"

[build.environment]
  # Ensure Netlify uses corepack-managed pnpm
  PNPM_HOME = "/opt/buildhome/.local/share/pnpm"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
